services:
  backend:
    build:
      context: ./backend
    container_name: auratrade-backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: auratrade-frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: auratrade-postgres
    environment:
      POSTGRES_DB: aura_ledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: h12@34aHUNDE
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: auratrade-redis
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: ./backend
    container_name: auratrade-celery-worker
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
